<!doctype html>
<html>
  <head>
    <title>Takisti</title>
    <script src="skeem2b.js"></script>
    <script>
        let r1, sc1;
        let x=10, y=50;
        function startPage(){
            r1=new Resistor("R1");  
            sc1=new SeriesConnection("SC1");
            sc1.addResistor(r1);
            sc1.draw(canvas1.getContext("2d"), x, y);
        }
        function addResistor(rname){
            sc1.addResistor(new Resistor(rname));
            sc1.draw(canvas1.getContext("2d"), x, y);
        }
    </script>
    <meta charset="utf-8">
  </head>
  <body onload="startPage()">
      <canvas id="canvas1" width="400" height="300"></canvas><br />
      <input type="text" id="tnimetus" /><input type="button" value="Lisa takisti" 
           onclick="addResistor(tnimetus.value)" />
  </body>
</html>
